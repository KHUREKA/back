version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: khuthon-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: khuthondb
      MYSQL_USER: khureka
      MYSQL_PASSWORD: khureka
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
