<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map</title>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
    </style>

    <script th:inline="javascript">
        function initMap() {
            var destName = /*[[${destName}]]*/ '목적지';
            var lat = /*[[${lat}]]*/ 37.5666102;
            var lng = /*[[${lng}]]*/ 126.9783881;

            var targetPosition = new naver.maps.LatLng(lat, lng);

            var map = new naver.maps.Map('map', {
                center: targetPosition,
                zoom: 16,
                mapTypeControl: false,
                scaleControl: false,
                logoControlOptions: { position: naver.maps.Position.BOTTOM_LEFT }
            });

            var marker = new naver.maps.Marker({
                position: targetPosition,
                map: map
            });

            var infoWindow = new naver.maps.InfoWindow({
                content: '<div style="padding:10px 15px; font-weight:bold; font-size:16px; color:#333; text-align:center; border-radius:8px;">' + destName + '</div>',
                borderWidth: 1,
                borderColor: '#00c73c',
                backgroundColor: '#ffffff'
            });

            infoWindow.open(map, marker);
        }

        window.navermap_authFailure = function () {
            console.error("NAVER Maps 인증 실패");
        };
    </script>
    <script
            type="text/javascript"
            th:src="|https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${ncpKeyId}&callback=initMap|">
    </script>
</head>
<body>
    <div id="map"></div>
</body>
</html>
